spring.application.name=Lavacao

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/CardosoLavacao?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
server.error.include-message=always
